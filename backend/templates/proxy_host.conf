{% include "_header_comment.conf" %}

{% if enabled %}

{% include "_hsts_map.conf" %}
{% if upstreams %}upstream npm_{{ id }} {
{% if balance_method %}  {{ balance_method }};
{% endif %}{% for u in upstreams %}  server {{ u.host }}:{{ u.port }}{% if u.weight %} weight={{ u.weight }}{% endif %}{% if u.max_fails != nil %} max_fails={{ u.max_fails }}{% endif %}{% if u.fail_timeout %} fail_timeout={{ u.fail_timeout }}s{% endif %}{% if u.backup %} backup{% endif %};
{% endfor %}}
{% endif %}
server {
  set $forward_scheme {{ forward_scheme }};
  set $server         "{{ forward_host }}";
  set $port           {{ forward_port }};

{% include "_listen.conf" %}
{% include "_certificates.conf" %}
{% include "_acme_relay.conf" %}
{% include "_assets.conf" %}
{% include "_exploits.conf" %}
{% include "_hsts.conf" %}
{% include "_forced_ssl.conf" %}

{% if allow_websocket_upgrade == 1 or allow_websocket_upgrade == true %}
proxy_set_header Upgrade $http_upgrade;
proxy_set_header Connection $http_connection;
proxy_http_version 1.1;
{% endif %}

  access_log /data/logs/proxy-host-{{ id }}_access.log proxy;
  error_log /data/logs/proxy-host-{{ id }}_error.log warn;

{% if client_max_body_size %}  client_max_body_size {{ client_max_body_size }};{% endif %}
{% if proxy_connect_timeout %}  proxy_connect_timeout {{ proxy_connect_timeout }}s;{% endif %}
{% if proxy_send_timeout %}  proxy_send_timeout {{ proxy_send_timeout }}s;{% endif %}
{% if proxy_read_timeout %}  proxy_read_timeout {{ proxy_read_timeout }}s;{% endif %}
{% if proxy_buffering %}  proxy_buffering {{ proxy_buffering }};{% endif %}

{{ advanced_config }}

{% if maintenance_mode == 1 or maintenance_mode == true %}

  error_page 503 @maintenance_{{ id }};
  location @maintenance_{{ id }} {
    add_header Retry-After 300 always;
    default_type text/html;
    root /data/nginx/maintenance;
    try_files /{{ id }}.html /_default.html =503;
  }

  location / {
    return 503;
  }

{% else %}

{{ locations }}

{% if use_default_location %}

  location / {

{% include "_access.conf" %}
{% include "_hsts.conf" %}

    {% if allow_websocket_upgrade == 1 or allow_websocket_upgrade == true %}
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $http_connection;
    proxy_http_version 1.1;
    {% endif %}

{% include "_headers.conf" %}
{% if upstreams %}    # Proxy to the load-balanced upstream group npm_{{ id }}.
    # The proxy_set_header lines below are copied verbatim from
    # docker/rootfs/etc/nginx/conf.d/include/proxy.conf and MUST be kept in sync
    # with it. A load-balanced host can't `include` proxy.conf because its
    # `proxy_pass $forward_scheme://$server:$port` cannot target an upstream group;
    # a static proxy_pass to npm_{{ id }} is emitted instead.
    add_header       X-Served-By $host;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Scheme $x_forwarded_scheme;
    proxy_set_header X-Forwarded-Proto  $x_forwarded_proto;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_pass       {{ forward_scheme }}://npm_{{ id }};
{% else %}    # Proxy!
    include conf.d/include/proxy.conf;
{% endif %}  }
{% endif %}

{% endif %}

  # Custom
  include /data/nginx/custom/server_proxy[.]conf;
}
{% endif %}
