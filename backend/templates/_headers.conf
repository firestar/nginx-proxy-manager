{% if headers %}{% for header in headers %}{% if header.direction == "request" and header.action == "set" %}
    proxy_set_header {{ header.name }} "{{ header.value }}";
{% endif %}{% if header.direction == "request" and header.action == "remove" %}
    proxy_set_header {{ header.name }} "";
{% endif %}{% if header.direction == "response" and header.action == "set" %}
    add_header {{ header.name }} "{{ header.value }}" always;
{% endif %}{% if header.direction == "response" and header.action == "remove" %}
    proxy_hide_header {{ header.name }};
{% endif %}{% endfor %}{% endif %}
