{% if acme_relay_url and acme_relay_url != "" %}
  # HTTP-01 ACME challenge relay. This host is served from a remote node, but
  # HTTP-01 challenges are solved by the panel. Forward challenge requests back
  # to the panel's public address (acme-relay-url setting) so certbot on the
  # panel can answer them. ^~ ensures this wins over the default location.
  location ^~ /.well-known/acme-challenge/ {
    auth_basic off;
    auth_request off;
    allow all;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_pass {{ acme_relay_url }};
  }
{% endif %}
